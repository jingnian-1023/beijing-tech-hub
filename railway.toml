# Railway 部署配置
# 使用方式：在 railway.app 导入 GitHub 仓库后自动识别
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[service]
port = 8000
healthcheckPath = "/api/health"

# 环境变量
[service.env]
PYTHONUNBUFFERED = "1"
DATABASE_URL = "sqlite+aiosqlite:///./beijing_tech_hub.db"
